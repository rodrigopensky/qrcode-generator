<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR Code Generator</title>
    <meta name="description" content="Simple and responsive QR Code Generator built with JavaScript">

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-6 text-center">

                <h1 class="mb-4">QR Code Generator</h1>

                <!-- Input where user enters the text or URL -->
                <input
                    type="text"
                    id="qr-input"
                    class="form-control form-control-lg mb-4"
                    placeholder="Type text or URL">

                <!-- QR Code Output -->
                <div id="qr-wrapper" class="text-center">

                    <div id="placeholder">
                        <p class="text-muted">Your QR Code will appear here</p>
                    </div>

                    <div id="qrcode"></div>

                </div>

                <!-- Download Button -->
                <div class="text-center mt-4">
                    <button
                        id="download-btn"
                        class="btn btn-primary">
                        Download QR Code
                    </button>
                </div>

        </div>

    </div>


    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/qrcode.min.js"></script>
    <script src="assets/js/html2canvas.js"></script>

    <!-- Application Script -->
    <script src="assets/js/app.js"></script>

</body>

</html>
